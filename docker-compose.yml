services:
  api:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.example
    environment:
      DATABASE_URL: sqlite:///./data/support_ops.db
      CHROMA_PATH: ./data/chroma
      AI_PROVIDER: ${AI_PROVIDER:-heuristic}
      GROQ_API_KEY: ${GROQ_API_KEY:-}
      GROQ_MODEL: ${GROQ_MODEL:-llama-3.3-70b-versatile}
    ports:
      - "8000:8000"
    volumes:
      - api-data:/app/data

  web:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  api-data:
